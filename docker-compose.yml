version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:20
    container_name: gpp-devcontainer
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    networks:
      - gpp-network
    depends_on:
      - redis
      - minio

  redis:
    image: redis:7-alpine
    container_name: gpp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gpp-network

  minio:
    image: minio/minio:latest
    container_name: gpp-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - gpp-network

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  gpp-network:
    driver: bridge
